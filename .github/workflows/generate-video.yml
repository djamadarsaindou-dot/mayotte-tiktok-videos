name: Génération vidéo TikTok automatique

on:
  # Cron désactivé : la génération se fait maintenant en local toutes les 2h
  # via Windows Task Scheduler (cf. scripts/install_cron.ps1).
  # Décommenter ci-dessous pour réactiver une exécution cloud.
  # schedule:
  #   - cron: '0 6,18 * * *'
  workflow_dispatch:  # bouton "Run workflow" manuel sur GitHub
    inputs:
      topic:
        description: "Thème (vide = aléatoire)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "decouverte_mayotte"
          - "tradition_mahoraise"
          - "legende_mahoraise"
          - "fait_insolite"
          - "actu_mayotte"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Coqui XTTS prend ~3-5 min en plus

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer PyTorch CPU (Coqui XTTS)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Cache du modèle XTTS v2 (1.8 GB)
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/tts
            ~/.local/share/tts
            ~/Library/Application Support/tts
          key: xtts-v2-model-v1

      - name: Générer la vidéo
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TTS_PROVIDER: ${{ secrets.TTS_PROVIDER || 'coqui' }}
          COQUI_SPEAKER: ${{ secrets.COQUI_SPEAKER || 'Damien Black' }}
          COQUI_TOS_AGREED: "1"
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python generate_video.py --topic "${{ github.event.inputs.topic }}"
          else
            python generate_video.py
          fi

      - name: Committer les métadonnées (json uniquement, pas la vidéo)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.json
          if git diff --cached --quiet; then
            echo "Aucune nouvelle metadata à committer"
          else
            git commit -m "🎬 nouvelle vidéo $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload de la vidéo (téléchargeable depuis l'onglet Actions)
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_id }}
          path: |
            output/*.mp4
            output/*.json
          retention-days: 30
